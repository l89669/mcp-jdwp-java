# Disable web application
spring.main.web-application-type=none
spring.main.banner-mode=off

# MCP Server configuration
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=jdwp-inspector
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.resource-change-notification=false

# Logging configured via logback-spring.xml.
# Logs go to stderr (not stdout) and to a file whose path is taken from the
# LOG_PATH system property. When launched as a Claude Code plugin, .mcp.json
# sets -DLOG_PATH=${CLAUDE_PLUGIN_ROOT}/logs/mcp-jdwp-inspector.log so the log
# lives next to the plugin install rather than in the user's CWD. When LOG_PATH
# is unset (e.g. running the jar directly), logback falls back to
# ${java.io.tmpdir}/mcp-jdwp-inspector.log.
